<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Orange background with rounded corners -->
  <rect width="500" height="500" rx="60" ry="60" fill="#F7922B"/>
  
  <!-- Ring/bubble above the k -->
  <circle cx="210" cy="88" r="38" fill="none" stroke="white" stroke-width="20"/>
  
  <!-- "k" stem (tall vertical) -->
  <path d="M155 130 Q148 200 155 340 Q158 360 165 370" 
        fill="none" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- "k" upper diagonal (top-right stroke) -->
  <path d="M163 230 Q210 195 255 165" 
        fill="none" stroke="white" stroke-width="22" stroke-linecap="round"/>
  
  <!-- "k" lower diagonal connecting to w loop -->
  <path d="M163 245 Q205 270 240 305 Q265 330 280 310" 
        fill="none" stroke="white" stroke-width="22" stroke-linecap="round"/>
  
  <!-- "w" part - left loop -->
  <path d="M280 310 Q295 285 305 310 Q315 340 330 320" 
        fill="none" stroke="white" stroke-width="22" stroke-linecap="round"/>
  
  <!-- "w" right loop - larger swirl -->
  <path d="M330 320 Q350 290 360 310 Q375 345 340 370 Q305 390 290 360" 
        fill="none" stroke="white" stroke-width="22" stroke-linecap="round"/>

  <!-- KIDSWORLD text -->
  <text x="250" y="430" 
        font-family="Arial Rounded MT Bold, Arial, sans-serif" 
        font-size="58" 
        font-weight="900"
        fill="white" 
        text-anchor="middle"
        letter-spacing="6">KIDSWORLD</text>
  
  <!-- Subtitle -->
  <text x="250" y="468" 
        font-family="Georgia, serif" 
        font-size="22" 
        font-style="italic"
        fill="rgba(255,255,255,0.85)" 
        text-anchor="middle"
        letter-spacing="1">Le monde appartient aux enfants</text>
</svg>
